  - keys:
      - runtime-telemetry
    instrumented_components:
      - name: JVM Runtime Telemetry
    description: |
      This instrumentation enables JVM runtime metrics using JMX (Java 8+) and JFR (Java 17+) to monitor classes, CPU, garbage collection, memory, and threads.
    stability: experimental
    support: community
    signals:
      - metrics:
          - metric_name: jvm.buffer.count
            instrument: updowncounter
            description: Number of buffers in the pool.
            category_notes: Custom metric.
          - metric_name: jvm.buffer.memory.limit
            instrument: updowncounter
            description: Measure of total memory capacity of buffers.
            category_notes: Custom metric.
          - metric_name: jvm.buffer.memory.used
            instrument: updowncounter
            description: Measure of memory used by buffers.
            category_notes: Custom metric.
          - metric_name: jvm.class.count
            instrument: updowncounter
            description: Number of classes currently loaded.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.class.loaded
            instrument: counter
            description: Number of classes loaded since JVM start.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.class.unloaded
            instrument: counter
            description: Number of classes unloaded since JVM start.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.cpu.count
            instrument: updowncounter
            description: Number of processors available to the Java virtual machine.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.cpu.recent_utilization
            instrument: gauge
            description: Recent CPU utilization for the process as reported by the
              JVM.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.cpu.time
            instrument: counter
            description: CPU time used by the process as reported by the JVM.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.file_descriptor.count
            instrument: updowncounter
            description: Number of open file descriptors as reported by the JVM.
            category_notes: Custom metric.
          - metric_name: jvm.file_descriptor.limit
            instrument: updowncounter
            description: Measure of max open file descriptors as reported by the JVM.
            category_notes: Custom metric.
          - metric_name: jvm.gc.duration
            instrument: histogram
            description: Duration of JVM garbage collection actions.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.memory.committed
            instrument: updowncounter
            description: Measure of memory committed.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.memory.init
            instrument: updowncounter
            description: Measure of initial memory requested.
            category_notes: Custom metric.
          - metric_name: jvm.memory.limit
            instrument: updowncounter
            description: Measure of max obtainable memory.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.memory.used
            instrument: updowncounter
            description: Measure of memory used.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.memory.used_after_last_gc
            instrument: updowncounter
            description: Measure of memory used, as measured after the most recent
              garbage collection event on this pool.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
          - metric_name: jvm.system.cpu.load_1m
            instrument: gauge
            description: Average CPU load of the whole system for the last minute
              as reported by the JVM.
            category_notes: Custom metric.
          - metric_name: jvm.system.cpu.utilization
            instrument: gauge
            description: Recent CPU utilization for the whole system as reported by
              the JVM.
            category_notes: Custom metric.
          - metric_name: jvm.thread.count
            instrument: updowncounter
            description: Number of executing platform threads.
            category_notes: APM bundled, if data points for the metric contain `telemetry.sdk.language`
              attribute.
    settings:
      - property: otel.instrumentation.runtime-telemetry.emit-experimental-metrics
        env: OTEL_INSTRUMENTATION_RUNTIME_TELEMETRY_EMIT_EXPERIMENTAL_METRICS
        description: Enables the capture of experimental JMX-based JVM runtime metrics.
        default: 'false'
        type: boolean
        category: instrumentation
      - property: otel.instrumentation.runtime-telemetry.emit-experimental-jfr-metrics
        env: OTEL_INSTRUMENTATION_RUNTIME_TELEMETRY_EMIT_EXPERIMENTAL_JFR_METRICS
        description: |
          Enables the capture of experimental JFR-based JVM runtime metrics on Java 17+.
        default: 'false'
        type: boolean
        category: instrumentation
      - property: otel.instrumentation.runtime-telemetry.experimental.prefer-jfr
        env: OTEL_INSTRUMENTATION_RUNTIME_TELEMETRY_EXPERIMENTAL_PREFER_JFR
        description: |
          Prefer JFR over JMX for metrics available from both sources, on Java 17+. When enabled, overlapping metrics are collected via JFR and the corresponding JMX metrics are suppressed.
        default: 'false'
        type: boolean
        category: instrumentation
      - property: otel.instrumentation.runtime-telemetry.experimental.package-emitter.enabled
        env: OTEL_INSTRUMENTATION_RUNTIME_TELEMETRY_EXPERIMENTAL_PACKAGE_EMITTER_ENABLED
        description: Enables creating events for JAR libraries used by the application.
