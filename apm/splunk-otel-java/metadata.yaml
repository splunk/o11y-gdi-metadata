            instrument: histogram
            description: |-
              Duration of database client operations.
              This metric is disabled by default and can be enabled with `otel.semconv-stability.opt-in=database,service.peer`.
            category_notes: Custom metric.
    settings:
      - property: otel.instrumentation.common.db.query-sanitization.enabled
        env: OTEL_INSTRUMENTATION_COMMON_DB_QUERY_SANITIZATION_ENABLED
        description: Enables query sanitization for database queries.
        default: 'true'
        type: boolean
        category: instrumentation
  - keys:
      - vertx-web-3.0
    instrumented_components:
      - name: Vert.x Web
        supported_versions: '[io.vertx:vertx-web:[3.0.0,)]'
    description: |
      This instrumentation enriches HTTP server spans with route information for Vert.x Web, it does not emit any telemetry on its own.
    stability: experimental
    support: community
  - keys:
      - vibur-dbcp-11.0
    instrumented_components:
      - name: Vibur DBCP
        supported_versions: '[org.vibur:vibur-dbcp:[11.0,)]'
    description: |
      This instrumentation enables database connection pool metrics for Vibur DBCP data sources.
    stability: experimental
    support: community
    signals:
      - metrics:
          - metric_name: db.client.connections.max
            instrument: updowncounter
            description: The maximum number of open connections allowed.
            category_notes: Custom metric.
          - metric_name: db.client.connections.usage
            instrument: updowncounter
            description: The number of connections that are currently in state described
              by the state attribute.
            category_notes: Custom metric.
          - metric_name: db.client.connection.count
            instrument: updowncounter
            description: |-
              The number of connections that are currently in state described by the state attribute.
              This metric is disabled by default and can be enabled with `otel.semconv-stability.opt-in=database`.
            category_notes: Custom metric.
          - metric_name: db.client.connection.max
            instrument: updowncounter
            description: |-
              The maximum number of open connections allowed.
              This metric is disabled by default and can be enabled with `otel.semconv-stability.opt-in=database`.
            category_notes: Custom metric.
