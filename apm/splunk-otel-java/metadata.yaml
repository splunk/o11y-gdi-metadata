  - keys:
      - jdbc
    instrumented_components:
      - name: JDBC
        supported_versions: '[Java 8+]'
    description: |
      This instrumentation enables database client spans and database client metrics for JDBC operations. There is also a datasource instrumentation that creates spans for datasource connections (disabled by default). Note: The instrumentation unwraps pooled connections to cache metadata against the underlying physical connection; without proper unwrapping, repeated metadata extraction can cause performance degradation.
    stability: experimental
    support: community
    signals:
      - metrics:
          - metric_name: db.client.operation.duration
            instrument: histogram
            description: |-
              Duration of database client operations.
              This metric is disabled by default and can be enabled with `otel.semconv-stability.opt-in=database,service.peer`.
            category_notes: Custom metric.
    settings:
      - property: otel.instrumentation.jdbc.query-sanitization.enabled
        env: OTEL_INSTRUMENTATION_JDBC_QUERY_SANITIZATION_ENABLED
        description: Enables query sanitization for database queries. Takes precedence
          over otel.instrumentation.common.db.query-sanitization.enabled.
        default: 'true'
        type: boolean
        category: instrumentation
      - property: otel.instrumentation.common.db.query-sanitization.enabled
        env: OTEL_INSTRUMENTATION_COMMON_DB_QUERY_SANITIZATION_ENABLED
        description: Enables query sanitization for database queries.
        default: 'true'
        type: boolean
        category: instrumentation
      - property: otel.instrumentation.jdbc.experimental.transaction.enabled
        env: OTEL_INSTRUMENTATION_JDBC_EXPERIMENTAL_TRANSACTION_ENABLED
        description: Enables experimental instrumentation to create spans for COMMIT
          and ROLLBACK operations.
        default: 'false'
        type: boolean
        category: instrumentation
      - property: otel.instrumentation.jdbc.experimental.sqlcommenter.enabled
        env: OTEL_INSTRUMENTATION_JDBC_EXPERIMENTAL_SQLCOMMENTER_ENABLED
        description: |
          Enables augmenting queries with a comment containing the tracing information. See [sqlcommenter](https://google.github.io/sqlcommenter/) for more info. WARNING: augmenting queries with tracing context will make query texts unique, which may have adverse impact on database performance. Consult with database experts before enabling.
        default: 'false'
        type: boolean
        category: instrumentation
      - property: otel.instrumentation.common.peer-service-mapping
        env: OTEL_INSTRUMENTATION_COMMON_PEER_SERVICE_MAPPING
        description: Used to specify a mapping from host names or IP addresses to
          peer services.
        default: ''
        type: map
        category: instrumentation
      - property: otel.instrumentation.jdbc.experimental.capture-query-parameters
        env: OTEL_INSTRUMENTATION_JDBC_EXPERIMENTAL_CAPTURE_QUERY_PARAMETERS
        description: |
          Sets whether the query parameters should be captured as span attributes named <code>db.query.parameter.&lt;key&gt;</code>. Enabling this option disables the statement sanitization.<p>WARNING: captured query parameters may contain sensitive information such as passwords, personally identifiable information or protected health info.
        default: 'false'
        type: boolean
        category: instrumentation
      - property: otel.instrumentation.jdbc-datasource.enabled
        env: OTEL_INSTRUMENTATION_JDBC_DATASOURCE_ENABLED
        description: Enables instrumentation of JDBC datasource connections.
        default: 'false'
        type: boolean
        category: instrumentation
