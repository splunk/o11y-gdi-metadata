component: "Splunk Distribution of OpenTelemetry Python"
version: "2.10.1"
dependencies:
  - name: "OpenTelemetry Python"
    source_href: "https://github.com/open-telemetry/opentelemetry-python"
    version: "1.41.0"
    stability: stable
  - name: "OpenTelemetry Python Contrib"
    source_href: "https://github.com/open-telemetry/opentelemetry-python-contrib"
    version: "0.62b0"
    stability: stable
  - name: "opentelemetry-api"
    version: "1.41.0"
    stability: stable
  - name: "opentelemetry-sdk"
    version: "1.41.0"
    stability: stable
  - name: "opentelemetry-propagator-b3"
    version: "1.41.0"
    stability: stable
  - name: "opentelemetry-exporter-otlp-proto-grpc"
    version: "1.41.0"
    stability: stable
  - name: "opentelemetry-exporter-otlp-proto-http"
    version: "1.41.0"
    stability: stable
  - name: "opentelemetry-instrumentation"
    version: "0.62b0"
    stability: stable
  - name: "opentelemetry-instrumentation-logging"
    version: "0.62b0"
    stability: stable
  - name: "opentelemetry-instrumentation-system-metrics"
    version: "0.62b0"
    stability: stable
  - name: "opentelemetry-semantic-conventions"
    version: "0.62b0"
    stability: stable
  - name: "protobuf"
    version: ">=6.33.5"
    stability: stable
  - name: "wrapt"
    version: ">=1.0.0,<2.0.0"
    stability: stable
settings:
  - env: OTEL_TRACES_EXPORTER
    description: "Comma-separated list of trace exporters. The Splunk distribution defaults to OTLP."
    default: "otlp"
    type: string
    category: exporter
  - env: OTEL_METRICS_EXPORTER
    description: "Comma-separated list of metric exporters. The Splunk distribution defaults to OTLP."
    default: "otlp"
    type: string
    category: exporter
  - env: OTEL_LOGS_EXPORTER
    description: "Comma-separated list of log exporters. The Splunk distribution defaults to OTLP."
    default: "otlp"
    type: string
    category: exporter
  - env: SPLUNK_REALM
    description: "Splunk Observability Cloud realm. When set, OTLP traces and metrics endpoints default to the realm ingest endpoints."
    default: ""
    type: string
    category: exporter
  - env: SPLUNK_ACCESS_TOKEN
    description: "Splunk authentication token added to OTLP exporter headers as x-sf-token when set."
    default: ""
    type: string
    category: exporter
  - env: OTEL_EXPORTER_OTLP_PROTOCOL
    description: "OTLP exporter transport protocol. When SPLUNK_REALM is set, the default is http/protobuf."
    default: ""
    type: string
    category: exporter
  - env: OTEL_EXPORTER_OTLP_HEADERS
    description: "Comma-separated list of additional OTLP exporter headers. The Splunk access token is appended here when configured."
    default: ""
    type: string
    category: exporter
  - env: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
    description: "OTLP traces endpoint. When SPLUNK_REALM is set, the default is the Splunk trace ingest endpoint for that realm."
    default: ""
    type: string
    category: exporter
  - env: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
    description: "OTLP metrics endpoint. When SPLUNK_REALM is set, the default is the Splunk metric ingest endpoint for that realm."
    default: ""
    type: string
    category: exporter
  - env: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
    description: "OTLP logs endpoint. Profiling can use SPLUNK_PROFILER_LOGS_ENDPOINT to set this endpoint."
    default: ""
    type: string
    category: exporter
  - env: OTEL_ATTRIBUTE_COUNT_LIMIT
    description: "Maximum number of attributes allowed on spans, events, links, and resources. The Splunk distribution leaves this unlimited by default."
    default: ""
    type: int
    category: limits
  - env: OTEL_ATTRIBUTE_VALUE_LENGTH_LIMIT
    description: "Maximum length of attribute values."
    default: "12000"
    type: int
    category: limits
  - env: OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT
    description: "Maximum number of attributes allowed on a span. The Splunk distribution leaves this unlimited by default."
    default: ""
    type: int
    category: limits
  - env: OTEL_SPAN_EVENT_COUNT_LIMIT
    description: "Maximum number of events allowed on a span. The Splunk distribution leaves this unlimited by default."
    default: ""
    type: int
    category: limits
  - env: OTEL_EVENT_ATTRIBUTE_COUNT_LIMIT
    description: "Maximum number of attributes allowed on a span event. The Splunk distribution leaves this unlimited by default."
    default: ""
    type: int
    category: limits
  - env: OTEL_LINK_ATTRIBUTE_COUNT_LIMIT
    description: "Maximum number of attributes allowed on a span link. The Splunk distribution leaves this unlimited by default."
    default: ""
    type: int
    category: limits
  - env: OTEL_SPAN_LINK_COUNT_LIMIT
    description: "Maximum number of links allowed on a span."
    default: "1000"
    type: int
    category: limits
  - env: OTEL_EXPERIMENTAL_RESOURCE_DETECTORS
    description: "Comma-separated list of resource detectors enabled by the SDK."
    default: "host,process"
    type: string
    category: resource
  - env: OTEL_TRACES_SAMPLER
    description: "Sampler used for traces."
    default: "always_on"
    type: string
    category: sampler
  - env: SPLUNK_TRACE_RESPONSE_HEADER_ENABLED
    description: "Activates the Splunk Server-Timing trace response header propagator."
    default: "true"
    type: boolean
    category: trace propagation
  - env: SPLUNK_OTEL_SYSTEM_METRICS_ENABLED
    description: "Activates system metrics instrumentation when set to true."
    default: "false"
    type: boolean
    category: instrumentation
  - env: SPLUNK_PROFILER_ENABLED
    description: "Activates continuous profiling."
    default: "false"
    type: boolean
    category: profiling
  - env: SPLUNK_PROFILER_CALL_STACK_INTERVAL
    description: "Frequency in milliseconds for continuous profiling call stack collection."
    default: "1000"
    type: int
    category: profiling
  - env: SPLUNK_PROFILER_LOGS_ENDPOINT
    description: "Collector endpoint for profiling logs. When set, it is forwarded to OTEL_EXPORTER_OTLP_LOGS_ENDPOINT."
    default: ""
    type: string
    category: profiling
  - env: SPLUNK_SNAPSHOT_PROFILER_ENABLED
    description: "Activates call graph snapshot profiling."
    default: "false"
    type: boolean
    category: profiling
  - env: SPLUNK_SNAPSHOT_SAMPLING_INTERVAL
    description: "Frequency in milliseconds for snapshot profiling stack sample collection."
    default: "10"
    type: int
    category: profiling
  - env: SPLUNK_SNAPSHOT_SELECTION_PROBABILITY
    description: "Fraction of traces selected for snapshot profiling."
    default: "0.01"
    type: double
    category: profiling
