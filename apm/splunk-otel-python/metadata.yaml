component: 'Splunk Distribution of OpenTelemetry Python'
version: '2.10.1'
dependencies:
  - name: 'OpenTelemetry Python'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python'
    version: '1.41.0'
    stability: 'stable'
  - name: 'OpenTelemetry Python Contrib'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python-contrib'
    version: '0.62b0'
    stability: 'experimental'
  - name: 'opentelemetry-api'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python/tree/main/opentelemetry-api'
    package_href: 'https://pypi.org/project/opentelemetry-api/'
    version: '1.41.0'
    stability: 'stable'
  - name: 'opentelemetry-sdk'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python/tree/main/opentelemetry-sdk'
    package_href: 'https://pypi.org/project/opentelemetry-sdk/'
    version: '1.41.0'
    stability: 'stable'
  - name: 'opentelemetry-propagator-b3'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python/tree/main/propagator/opentelemetry-propagator-b3'
    package_href: 'https://pypi.org/project/opentelemetry-propagator-b3/'
    version: '1.41.0'
    stability: 'stable'
  - name: 'opentelemetry-exporter-otlp-proto-grpc'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python/tree/main/exporter/opentelemetry-exporter-otlp-proto-grpc'
    package_href: 'https://pypi.org/project/opentelemetry-exporter-otlp-proto-grpc/'
    version: '1.41.0'
    stability: 'stable'
  - name: 'opentelemetry-exporter-otlp-proto-http'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python/tree/main/exporter/opentelemetry-exporter-otlp-proto-http'
    package_href: 'https://pypi.org/project/opentelemetry-exporter-otlp-proto-http/'
    version: '1.41.0'
    stability: 'stable'
  - name: 'opentelemetry-instrumentation'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/opentelemetry-instrumentation'
    package_href: 'https://pypi.org/project/opentelemetry-instrumentation/'
    version: '0.62b0'
    stability: 'experimental'
  - name: 'opentelemetry-instrumentation-logging'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/instrumentation/opentelemetry-instrumentation-logging'
    package_href: 'https://pypi.org/project/opentelemetry-instrumentation-logging/'
    version: '0.62b0'
    stability: 'experimental'
  - name: 'opentelemetry-instrumentation-system-metrics'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/instrumentation/opentelemetry-instrumentation-system-metrics'
    package_href: 'https://pypi.org/project/opentelemetry-instrumentation-system-metrics/'
    version: '0.62b0'
    stability: 'experimental'
  - name: 'opentelemetry-semantic-conventions'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python/tree/main/opentelemetry-semantic-conventions'
    package_href: 'https://pypi.org/project/opentelemetry-semantic-conventions/'
    version: '0.62b0'
    stability: 'experimental'
  - name: 'opentelemetry-opamp-client'
    source_href: 'https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/opamp/opentelemetry-opamp-client'
    package_href: 'https://pypi.org/project/opentelemetry-opamp-client/'
    version: '0.1b0'
    stability: 'experimental'
  - name: 'protobuf'
    package_href: 'https://pypi.org/project/protobuf/'
    version: '>=6.33.5'
    stability: 'stable'
  - name: 'wrapt'
    package_href: 'https://pypi.org/project/wrapt/'
    version: '>=1.0.0,<2.0.0'
    stability: 'stable'
settings:
  - property: 'otel.traces.exporter'
    env: 'OTEL_TRACES_EXPORTER'
    description: 'Comma-separated list of trace exporters. The Splunk distribution defaults to OTLP.'
    default: 'otlp'
    type: 'string'
    category: 'exporter'
  - property: 'otel.metrics.exporter'
    env: 'OTEL_METRICS_EXPORTER'
    description: 'Comma-separated list of metric exporters. The Splunk distribution defaults to OTLP.'
    default: 'otlp'
    type: 'string'
    category: 'exporter'
  - property: 'otel.logs.exporter'
    env: 'OTEL_LOGS_EXPORTER'
    description: 'Comma-separated list of log exporters. The Splunk distribution defaults to OTLP.'
    default: 'otlp'
    type: 'string'
    category: 'exporter'
  - property: 'splunk.realm'
    env: 'SPLUNK_REALM'
    description: 'Splunk Observability Cloud realm. When set, OTLP traces and metrics endpoints default to the realm ingest endpoints.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'splunk.access.token'
    env: 'SPLUNK_ACCESS_TOKEN'
    description: 'Splunk authentication token added to OTLP exporter headers as x-sf-token when set.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.exporter.otlp.protocol'
    env: 'OTEL_EXPORTER_OTLP_PROTOCOL'
    description: 'OTLP exporter transport protocol.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.exporter.otlp.traces.protocol'
    env: 'OTEL_EXPORTER_OTLP_TRACES_PROTOCOL'
    description: 'OTLP traces exporter transport protocol.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.exporter.otlp.metrics.protocol'
    env: 'OTEL_EXPORTER_OTLP_METRICS_PROTOCOL'
    description: 'OTLP metrics exporter transport protocol.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.exporter.otlp.logs.protocol'
    env: 'OTEL_EXPORTER_OTLP_LOGS_PROTOCOL'
    description: 'OTLP logs exporter transport protocol.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.exporter.otlp.headers'
    env: 'OTEL_EXPORTER_OTLP_HEADERS'
    description: 'Comma-separated list of additional OTLP exporter headers.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.exporter.otlp.endpoint'
    env: 'OTEL_EXPORTER_OTLP_ENDPOINT'
    description: 'OTLP endpoint used as the base endpoint for traces, metrics, and logs.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.exporter.otlp.traces.endpoint'
    env: 'OTEL_EXPORTER_OTLP_TRACES_ENDPOINT'
    description: 'OTLP traces endpoint. When SPLUNK_REALM is set, the default is the Splunk trace ingest endpoint for that realm.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.exporter.otlp.metrics.endpoint'
    env: 'OTEL_EXPORTER_OTLP_METRICS_ENDPOINT'
    description: 'OTLP metrics endpoint. When SPLUNK_REALM is set, the default is the Splunk metric ingest endpoint for that realm.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.exporter.otlp.logs.endpoint'
    env: 'OTEL_EXPORTER_OTLP_LOGS_ENDPOINT'
    description: 'OTLP logs endpoint. Profiling can use SPLUNK_PROFILER_LOGS_ENDPOINT to set this endpoint.'
    default: ''
    type: 'string'
    category: 'exporter'
  - property: 'otel.attribute.count.limit'
    env: 'OTEL_ATTRIBUTE_COUNT_LIMIT'
    description: 'Maximum number of attributes allowed on spans, events, links, and resources. The Splunk distribution leaves this unlimited by default.'
    default: ''
    type: 'int'
    category: 'limits'
  - property: 'otel.attribute.value.length.limit'
    env: 'OTEL_ATTRIBUTE_VALUE_LENGTH_LIMIT'
    description: 'Maximum length of attribute values.'
    default: '12000'
    type: 'int'
    category: 'limits'
  - property: 'otel.span.attribute.count.limit'
    env: 'OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT'
    description: 'Maximum number of attributes allowed on a span. The Splunk distribution leaves this unlimited by default.'
    default: ''
    type: 'int'
    category: 'limits'
  - property: 'otel.span.event.count.limit'
    env: 'OTEL_SPAN_EVENT_COUNT_LIMIT'
    description: 'Maximum number of events allowed on a span. The Splunk distribution leaves this unlimited by default.'
    default: ''
    type: 'int'
    category: 'limits'
  - property: 'otel.event.attribute.count.limit'
    env: 'OTEL_EVENT_ATTRIBUTE_COUNT_LIMIT'
    description: 'Maximum number of attributes allowed on a span event. The Splunk distribution leaves this unlimited by default.'
    default: ''
    type: 'int'
    category: 'limits'
  - property: 'otel.link.attribute.count.limit'
    env: 'OTEL_LINK_ATTRIBUTE_COUNT_LIMIT'
    description: 'Maximum number of attributes allowed on a span link. The Splunk distribution leaves this unlimited by default.'
    default: ''
    type: 'int'
    category: 'limits'
  - property: 'otel.span.link.count.limit'
    env: 'OTEL_SPAN_LINK_COUNT_LIMIT'
    description: 'Maximum number of links allowed on a span.'
    default: '1000'
    type: 'int'
    category: 'limits'
  - property: 'otel.experimental.resource.detectors'
    env: 'OTEL_EXPERIMENTAL_RESOURCE_DETECTORS'
    description: 'Comma-separated list of resource detectors enabled by the SDK.'
    default: 'host,process'
    type: 'string'
    category: 'resource'
  - property: 'otel.resource.attributes'
    env: 'OTEL_RESOURCE_ATTRIBUTES'
    description: 'Comma-separated resource attributes in key=value form.'
    default: ''
    type: 'string'
    category: 'resource'
  - property: 'otel.service.name'
    env: 'OTEL_SERVICE_NAME'
    description: 'Logical service name. Defaults to unnamed-python-service in this distribution.'
    default: 'unnamed-python-service'
    type: 'string'
    category: 'resource'
  - property: 'otel.traces.sampler'
    env: 'OTEL_TRACES_SAMPLER'
    description: 'Sampler used for traces.'
    default: 'always_on'
    type: 'string'
    category: 'sampler'
  - property: 'splunk.trace-response-header.enabled'
    env: 'SPLUNK_TRACE_RESPONSE_HEADER_ENABLED'
    description: 'Activates the Splunk Server-Timing trace response header propagator.'
    default: 'true'
    type: 'boolean'
    category: 'trace propagation'
  - property: 'splunk.otel.system.metrics.enabled'
    env: 'SPLUNK_OTEL_SYSTEM_METRICS_ENABLED'
    description: 'Activates system metrics instrumentation when set to true.'
    default: 'false'
    type: 'boolean'
    category: 'instrumentation'
  - property: 'otel.python.disabled.instrumentations'
    env: 'OTEL_PYTHON_DISABLED_INSTRUMENTATIONS'
    description: 'Comma-separated list of Python auto-instrumentations to disable.'
    default: ''
    type: 'string'
    category: 'instrumentation'
  - property: 'splunk.profiler.enabled'
    env: 'SPLUNK_PROFILER_ENABLED'
    description: 'Activates continuous profiling.'
    default: 'false'
    type: 'boolean'
    category: 'profiling'
  - property: 'splunk.profiler.call.stack.interval'
    env: 'SPLUNK_PROFILER_CALL_STACK_INTERVAL'
    description: 'Frequency in milliseconds for continuous profiling call stack collection.'
    default: '1000'
    type: 'int'
    category: 'profiling'
  - property: 'splunk.profiler.logs.endpoint'
    env: 'SPLUNK_PROFILER_LOGS_ENDPOINT'
    description: 'Collector endpoint for profiling logs.'
    default: ''
    type: 'string'
    category: 'profiling'
  - property: 'splunk.snapshot.profiler.enabled'
    env: 'SPLUNK_SNAPSHOT_PROFILER_ENABLED'
    description: 'Activates call graph snapshot profiling.'
    default: 'false'
    type: 'boolean'
    category: 'profiling'
  - property: 'splunk.snapshot.sampling.interval'
    env: 'SPLUNK_SNAPSHOT_SAMPLING_INTERVAL'
    description: 'Frequency in milliseconds for snapshot profiling stack sample collection.'
    default: '10'
    type: 'int'
    category: 'profiling'
  - property: 'splunk.snapshot.selection.probability'
    env: 'SPLUNK_SNAPSHOT_SELECTION_PROBABILITY'
    description: 'Fraction of traces selected for snapshot profiling.'
    default: '0.01'
    type: 'double'
    category: 'profiling'
  - property: 'splunk.opamp.enabled'
    env: 'SPLUNK_OPAMP_ENABLED'
    description: 'Activates the OpAMP client.'
    default: 'false'
    type: 'boolean'
    category: 'opamp'
  - property: 'splunk.opamp.endpoint'
    env: 'SPLUNK_OPAMP_ENDPOINT'
    description: 'OpAMP server endpoint.'
    default: 'http://localhost:4320/v1/opamp'
    type: 'string'
    category: 'opamp'
  - property: 'splunk.opamp.polling.interval'
    env: 'SPLUNK_OPAMP_POLLING_INTERVAL'
    description: 'OpAMP polling interval in milliseconds.'
    default: '30000'
    type: 'int'
    category: 'opamp'
metrics: []
