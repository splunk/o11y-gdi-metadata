resource_detectors:
  - key: 'host'
    description: 'Host resource detector.'
    attributes:
      - id: 'host.name'
      - id: 'host.arch'
    stability: 'experimental'
    support: 'community'
    dependencies:
      - name: 'OpenTelemetry Python SDK'
        source_href: 'https://github.com/open-telemetry/opentelemetry-python/tree/main/opentelemetry-sdk'
        package_href: 'https://pypi.org/project/opentelemetry-sdk/'
        version: '1.41.0'
        stability: 'stable'
  - key: 'os'
    description: 'Operating system resource detector.'
    attributes:
      - id: 'os.type'
      - id: 'os.version'
    stability: 'experimental'
    support: 'community'
    dependencies:
      - name: 'OpenTelemetry Python SDK'
        source_href: 'https://github.com/open-telemetry/opentelemetry-python/tree/main/opentelemetry-sdk'
        package_href: 'https://pypi.org/project/opentelemetry-sdk/'
        version: '1.41.0'
        stability: 'stable'
  - key: 'process'
    description: 'Process resource detector.'
    attributes:
      - id: 'process.runtime.description'
      - id: 'process.runtime.name'
      - id: 'process.runtime.version'
      - id: 'process.pid'
      - id: 'process.executable.name'
      - id: 'process.executable.path'
      - id: 'process.command'
      - id: 'process.command_line'
      - id: 'process.command_args'
      - id: 'process.parent_pid'
      - id: 'process.owner'
    stability: 'experimental'
    support: 'community'
    dependencies:
      - name: 'OpenTelemetry Python SDK'
        source_href: 'https://github.com/open-telemetry/opentelemetry-python/tree/main/opentelemetry-sdk'
        package_href: 'https://pypi.org/project/opentelemetry-sdk/'
        version: '1.41.0'
        stability: 'stable'
  - key: 'otel'
    description: 'Environment variable resource detector.'
    attributes:
      - id: 'service.name'
      - id: 'OTEL_RESOURCE_ATTRIBUTES keys'
    stability: 'stable'
    support: 'community'
    dependencies:
      - name: 'OpenTelemetry Python SDK'
